<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Louvor Sync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Louvor Sync 🎵</h1>
  <p>Cifras sincronizadas em tempo real</p>
</header>

<main>
  <section class="painel">
    <h2>Painel do Líder</h2>

    <select id="pdfSelect">
      <option value="so-quero-adorar.pdf">Só Quero Adorar</option>
      <option value="grandioso-es-tu.pdf">Grandioso És Tu</option>
      <option value="porque-ele-vive.pdf">Porque Ele Vive</option>
    </select>

    <div class="botoes">
      <button id="btnAbrir">Abrir cifra</button>
      <button id="btnAnterior">Página anterior</button>
      <button id="btnProxima">Próxima página</button>
    </div>

    <p id="infoPagina">Página 1</p>
  </section>

  <section class="visualizador">
    <canvas id="pdfCanvas"></canvas>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
