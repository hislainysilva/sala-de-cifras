<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Louvor Sync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="telaLogin" class="login-overlay">
  <div class="login-card">
    <h1>Louvor Sync 🎵</h1>
    <h2 id="tituloLogin">Acesso Restrito</h2>

    <input type="password" id="senhaLogin" placeholder="Digite a senha">

    <button id="btnEntrarLogin">Entrar</button>

    <p id="erroLogin"></p>
  </div>
</div>
<header>
  <h1>Louvor Sync 🎵</h1>
  <p>Cifras sincronizadas em tempo real</p>
</header>

<main>
  <section class="painel">
    <div id="painelAdmin">
  <h2>Adicionar Nova Cifra</h2>

  <input type="text" id="nomeNovaCifra" placeholder="Nome da música">
  <input type="text" id="arquivoNovaCifra" placeholder="Nome exato do PDF">

  <button id="btnAdicionarCifra">Adicionar cifra</button>

  <p id="mensagemAdmin"></p>
</div>
  <h2 id="tituloPainel">Painel</h2>

  <div id="painelLider">
    <input type="text" id="buscaCifra" placeholder="Buscar cifra...">
    <select id="pdfSelect"></select>

    <div class="botoes">
      <button id="btnAbrir">Abrir cifra</button>
      <button id="btnAnterior">Página anterior</button>
      <button id="btnProxima">Próxima página</button>
    </div>
  </div>

  <p id="infoPagina">Página 1</p>
</section>

  <section class="visualizador">
    <canvas id="pdfCanvas"></canvas>
  </section>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
